<style>
  :root{
    --bg:#0b0420; --bg2:#150733; --ink:#0b0420;
    --magenta:#ff2e88; --cyan:#00e5ff; --gold:#ffd23f; --purple:#b14aed; --green:#27e36b;
    --white:#f7f7ff; --pix:'Press Start 2P',monospace; --term:'VT323',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--white);font-family:var(--term);overflow-x:hidden;overflow-y:auto;
    image-rendering:pixelated;-webkit-font-smoothing:none}
  ::selection{background:var(--magenta);color:#fff}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}

  /* ---- synthwave neon grid floor ---- */
  .floor{position:fixed;bottom:0;left:50%;transform:translateX(-50%) perspective(260px) rotateX(67deg);
    transform-origin:bottom center;width:240vw;height:130vh;z-index:0;
    background:
      repeating-linear-gradient(to right, transparent 0 47px, var(--purple) 47px 49px),
      repeating-linear-gradient(to bottom, transparent 0 47px, var(--purple) 47px 49px);
    background-size:48px 48px;
    -webkit-mask:linear-gradient(to top,#000 8%,transparent 72%);mask:linear-gradient(to top,#000 8%,transparent 72%);
    animation:roll 1.1s linear infinite;opacity:.85}
  @keyframes roll{from{background-position:0 0}to{background-position:0 48px}}
  .skyglow{position:fixed;inset:0 0 35% 0;z-index:0;pointer-events:none;
    background:radial-gradient(120% 130% at 50% 8%, #3a0f5e 0%, #160733 42%, var(--bg) 72%)}

  /* ---- retro sun behind title ---- */
  .sun{position:fixed;top:34%;left:50%;transform:translate(-50%,-50%);width:min(60vw,400px);height:min(60vw,400px);
    border-radius:50%;z-index:1;background:linear-gradient(#fff34d 0%,#ff9a3f 46%,var(--magenta) 100%);
    filter:drop-shadow(0 0 70px rgba(255,46,136,.45))}
  .sun::after{content:"";position:absolute;left:0;right:0;bottom:0;height:54%;border-radius:0 0 50% 50%;
    background:repeating-linear-gradient(to bottom, transparent 0 6px, var(--bg) 6px 13px)}

  /* ---- CRT overlays ---- */
  .scan{position:fixed;inset:0;z-index:40;pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.28) 2px 4px)}
  .vig{position:fixed;inset:0;z-index:41;pointer-events:none;box-shadow:inset 0 0 180px rgba(0,0,0,.85);
    background:radial-gradient(130% 120% at 50% 50%, transparent 58%, rgba(0,0,0,.5))}
  .flick{position:fixed;inset:0;z-index:42;pointer-events:none;background:#9be3ff;mix-blend-mode:overlay;opacity:0;animation:flick 5s steps(1) infinite}
  @keyframes flick{0%,97%,100%{opacity:0}98%{opacity:.04}99%{opacity:.02}}

  /* ---- HUD ---- */
  .hud{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;justify-content:space-between;align-items:center;
    padding:16px 18px;font-family:var(--pix);font-size:10px;letter-spacing:.04em;color:var(--cyan);text-shadow:2px 2px 0 #000}
  .hud .r{color:var(--gold)}
  @media(max-width:560px){.hud{font-size:8px}}

  /* ---- cover cartridge ---- */
  .cover{margin:0 auto;width:min(82vw,380px);aspect-ratio:1/1;border:4px solid #fff;background:#000;overflow:hidden;
    box-shadow:0 0 0 4px var(--ink),0 0 0 8px var(--magenta),0 0 32px rgba(255,46,136,.45);
    animation:pop .5s steps(3) both}
  .cover img{width:100%;height:100%;object-fit:cover;display:block;image-rendering:auto}
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:none;opacity:1}}

  /* ---- center stage ---- */
  .stage{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:64px 18px 70px}
  .title{font-family:var(--pix);font-size:clamp(20px,6.2vw,58px);line-height:1.32;color:var(--white);
    text-shadow:3px 3px 0 var(--magenta),6px 6px 0 var(--cyan),0 0 18px rgba(0,229,255,.35);
    animation:pop .5s steps(3) both}
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:none;opacity:1}}
  .title small{display:block;font-size:.55em;margin-top:10px}
  .sub{margin-top:18px;font-family:var(--pix);font-size:10px;letter-spacing:.06em;color:var(--gold);text-shadow:2px 2px 0 #000}
  .sub .b{color:var(--magenta)}

  /* loading bar */
  .load{margin-top:18px;font-family:var(--pix);font-size:9px;color:var(--cyan);text-shadow:2px 2px 0 #000;letter-spacing:.1em}
  .bar{display:inline-block;margin-left:8px;letter-spacing:2px}

  /* ---- RPG dialogue box (the form) ---- */
  .box{margin-top:26px;width:min(94vw,480px);background:rgba(8,4,26,.92);
    border:4px solid var(--white);padding:20px 18px 18px;position:relative;
    box-shadow:0 0 0 4px var(--ink),0 0 0 8px var(--cyan),0 0 26px rgba(0,229,255,.25);
    animation:fade .6s steps(2) .25s both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .box .ask{font-family:var(--pix);font-size:9px;line-height:1.9;color:var(--white);text-align:left}
  .box .ask .c{color:var(--gold)}
  form{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
  form input{flex:1;min-width:160px;background:#06021a;border:3px solid var(--cyan);color:var(--white);
    font-family:var(--term);font-size:22px;line-height:1;padding:9px 11px;outline:none}
  form input::placeholder{color:#6b6a86}
  form input:focus{border-color:var(--magenta);box-shadow:0 0 0 2px rgba(255,46,136,.4)}
  form button{font-family:var(--pix);font-size:11px;color:#fff;background:var(--magenta);border:3px solid #fff;
    padding:11px 16px;box-shadow:4px 4px 0 #000;transition:transform .05s,box-shadow .05s}
  form button:hover{background:#ff4f9c}
  form button:active{transform:translate(4px,4px);box-shadow:0 0 0 #000}
  .err{min-height:16px;margin-top:10px;font-family:var(--pix);font-size:8px;color:#ff5a4d;text-align:left;letter-spacing:.04em}
  .prompt{margin-top:14px;font-family:var(--pix);font-size:8px;color:var(--green);text-align:left;letter-spacing:.06em}
  .blink{animation:blink 1s steps(1) infinite}@keyframes blink{50%{opacity:0}}

  /* success */
  .win{display:none;width:min(94vw,520px)}
  .win.show{display:block;animation:fade .4s steps(2) both}
  .win .lvl{font-family:var(--pix);font-size:clamp(13px,3.4vw,22px);color:var(--green);text-shadow:3px 3px 0 #000,0 0 16px rgba(39,227,107,.5);line-height:1.6}
  .win .pid{margin-top:16px;font-family:var(--pix);font-size:clamp(18px,5vw,34px);color:var(--gold);text-shadow:3px 3px 0 var(--magenta)}
  .win .ps{margin-top:16px;font-family:var(--pix);font-size:9px;color:var(--cyan);line-height:1.9}

  .foot{position:fixed;bottom:0;left:0;right:0;z-index:30;text-align:center;padding:12px;
    font-family:var(--pix);font-size:8px;color:#7b6fb0;letter-spacing:.08em}
  /* ---- retro instagram badge ---- */
  .ig{position:fixed;left:16px;bottom:16px;z-index:45;width:50px;height:50px;display:grid;place-items:center;
    background:rgba(10,6,34,.82);border:3px solid #fff;box-shadow:4px 4px 0 #000,0 0 16px rgba(255,46,136,.45);
    transition:transform .06s,box-shadow .06s,background .2s}
  .ig:hover{background:rgba(255,46,136,.28)}
  .ig:active{transform:translate(4px,4px);box-shadow:0 0 0 #000}
  .ig svg{width:28px;height:28px;display:block;image-rendering:auto}
  .ig .tagig{position:absolute;left:58px;bottom:14px;white-space:nowrap;font-family:var(--pix);font-size:8px;color:var(--gold);text-shadow:2px 2px 0 #000;opacity:0;transform:translateX(-4px);transition:opacity .2s,transform .2s;pointer-events:none}
  .ig:hover .tagig{opacity:1;transform:none}
  @media(max-width:560px){.ig{width:44px;height:44px}.ig svg{width:24px;height:24px}.ig .tagig{display:none}}
</style>
</head>

<script>
(function(){
  /* animated loading bar */
  var bar=document.getElementById('bar'), n=3;
  setInterval(function(){ n=n%10+1; bar.textContent='▓'.repeat(n)+'░'.repeat(10-n); },420);

  /* counter count-up */
  var cEl=document.getElementById('count'), base=1284, c=0;
  (function up(){ c+=Math.ceil((base-c)/12); if(c>=base)c=base; cEl.textContent=c; if(c<base)setTimeout(up,40); })();

  /* 8-bit sound (Web Audio square wave) */
  var actx=null;
  function blip(freq,dur,when,type){ if(!actx)return;
    var o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    o.connect(g); g.connect(actx.destination);
    var t=actx.currentTime+(when||0); g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(.12,t+.01); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.start(t); o.stop(t+dur+.02);
  }
  function ensure(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended')actx.resume(); }
  function coin(){ ensure(); blip(988,.08,0); blip(1319,.18,.08); }              // classic coin
  function levelup(){ ensure(); [523,659,784,1047].forEach(function(f,i){ blip(f,.14,i*.09,'square'); }); }
  function tick(){ ensure(); blip(440,.03,0,'square'); }

  /* form */
  var form=document.getElementById('form'), email=document.getElementById('email'), err=document.getElementById('err');
  email.addEventListener('focus',function(){ tick(); }, {once:true});
  form.addEventListener('submit',function(e){

    var v=(email.value||'').trim();
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){ err.textContent='! INVALID EMAIL — TRY AGAIN'; coin&&null; ensure(); blip(160,.18,0,'sawtooth'); email.focus(); return; }
    err.textContent='';
    document.getElementById('pid').textContent=(base+1);
    coin(); levelup();

    try{window.va&&window.va('event',{name:'waitlist_signup'});}catch(_){}
    document.getElementById('win').classList.add('show');
  });
})();
